# KDD Compare Test - FM-Optimized Embedding Comparison Experiment
# ============================================================
# Compare 5 fine-ranking models: Direct Prediction vs FM-Optimized Embedding Prediction

seed: 42
output_dir: "./output"
device: "auto"  # auto / cuda:0 / cpu

# ──────────────────────────────────────────────────
# Dataset Configuration
# ──────────────────────────────────────────────────
dataset:
  name: "alimamaTech/MAC"    # HuggingFace dataset name
  target_attribution: "last_click"  # last_click / first_click / dda / linear
  max_samples: -1             # -1 for full dataset, or set a limit for debugging
  train_ratio: 0.8
  batch_size: 4096
  num_workers: 4
  # Feature configuration
  sparse_features: []        # Auto-detected from dataset
  dense_features: []          # Auto-detected from dataset
  embed_dim: 16               # Embedding dimension for sparse features
  sequence_features: false    # Whether to use behavior sequence features

# ──────────────────────────────────────────────────
# Fine-Ranking Model Configuration
# ──────────────────────────────────────────────────
models:
  dnn:
    hidden_dims: [256, 128, 64]
    dropout: 0.1
    activation: "relu"
  
  wide_deep:
    hidden_dims: [256, 128, 64]
    dropout: 0.1
    activation: "relu"
  
  deepfm:
    hidden_dims: [256, 128, 64]
    dropout: 0.1
    activation: "relu"
  
  dcn:
    hidden_dims: [256, 128, 64]
    num_cross_layers: 3
    dropout: 0.1
    activation: "relu"
  
  autoint:
    hidden_dims: [256, 128, 64]
    num_attention_layers: 3
    num_heads: 4
    attention_dim: 64
    dropout: 0.1
    activation: "relu"

# ──────────────────────────────────────────────────
# Training Configuration (for fine-ranking models)
# ──────────────────────────────────────────────────
training:
  epochs: 1
  lr: 0.003
  weight_decay: 1e-5
  grad_clip: 5.0
  early_stop_patience: 2
  save_every: 1
  multi_gpu: false          # 是否启用多卡训练 (DataParallel)
  gpu_ids: []               # 指定 GPU 列表, 例如 [0,1,2,3]; 空表示使用全部可见 GPU

# ──────────────────────────────────────────────────
# FM Optimizer Configuration (adapted from falcon)
# ──────────────────────────────────────────────────
fm_optimizer:
  # Flow Matching model architecture
  # 当使用 falcon 预训练 checkpoint 时, 必须与 falcon 配置一致:
  #   data_dim=256, time_dim=128, cond_dim=256,
  #   transformer_dim=1024, transformer_depth=8, transformer_heads=8
  # 从头训练时, data_dim/cond_dim 自动匹配精排模型 embedding 维度
  data_dim: 256
  time_dim: 128
  cond_dim: 256
  backbone_type: "transformer"  # transformer / mlp
  # MLP backbone params
  hidden_dim: 512
  num_layers: 6
  dropout: 0.1
  # Transformer backbone params (与 falcon 一致)
  transformer_dim: 1024
  transformer_depth: 8
  transformer_heads: 8
  transformer_mlp_ratio: 4.0
  transformer_dropout: 0.1
  # ODE sampling
  sample_steps: 50
  sample_method: "euler"      # euler / rk4
  # Time weighting (from falcon)
  time_weight_mode: "mid"    # none / mid / late / early
  time_weight_scale: 1.0
  # FM loss weight (key parameter: controls how much FM influences optimization)
  fm_weight: 1.0              # Weight of FM flow matching loss vs prediction loss
  # Prediction head on FM-optimized embeddings
  pred_hidden_dims: [128, 64]
  pred_dropout: 0.1
  # FM training
  fm_epochs: 5
  fm_lr: 1e-3
  fm_weight_decay: 1e-5
  fm_grad_clip: 1.0
  fm_batch_size: 4096
  fm_ema_loss_alpha: 0.1
  # Pretrained FM checkpoint (from falcon)
  fm_checkpoint: ""            # e.g., /path/to/best_fm.pt
  freeze_fm: true              # Freeze FM backbone when loading pretrained checkpoint
  # 训练加速选项
  fast_train: true             # 快速训练: 跳过 ODE 求解, 用 projected embedding 直接预测 (大幅加速)
  train_delta_t: 0.3           # 训练时 ODE 步长 (仅 fast_train=false 时生效)
  train_ode_steps: 10          # 训练时 ODE 步数 (仅 fast_train=false 时生效)
  eval_interval: 1             # 完整 ODE 评估间隔 (每 N 个 epoch; >1 时中间用快速代理评估)
  use_amp: true                # 混合精度训练 (AMP, 需 GPU)
  compile_velocity: false      # torch.compile 加速 velocity_net (需 PyTorch 2.0+)

# ──────────────────────────────────────────────────
# Evaluation Configuration
# ──────────────────────────────────────────────────
evaluation:
  metrics: ["auc", "gauc", "logloss", "ndcg"]
  ndcg_k: 10
